<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="light dark">
    <meta name="description" content="Resposta gerada por IA via Ollama">
    <title>Resposta - {{TIMESTAMP}}</title>
    <link rel="preconnect" href="https://rsms.me/" crossorigin>
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <style>
        /* Configuração global e suporte a tema */
        :root {
            color-scheme: light dark;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --font-mono: 'SF Mono', 'Menlo', 'Monaco', 'Cascadia Code', 'Courier New', monospace;
            
            /* Light theme (padrão) */
            --bg: #ffffff;
            --bg-subtle: #f8f8f8;
            --text-main: #1a1a1a;
            --text-muted: #6c6c6c;
            --border: #eaeaea;
            --accent: #000000;
            --accent-soft: #222222;
            --code-bg: #f2f2f2;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0a0a0a;
                --bg-subtle: #111111;
                --text-main: #ededed;
                --text-muted: #9a9a9a;
                --border: #2a2a2a;
                --accent: #ffffff;
                --accent-soft: #e0e0e0;
                --code-bg: #1e1e1e;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Acessibilidade e comportamento suave */
        @media (prefers-reduced-motion: no-preference) {
            html {
                scroll-behavior: smooth;
            }
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .wrapper {
            max-width: 720px;
            width: 100%;
            margin: 0 auto;
        }

        /* Header mais informativo */
        header {
            margin-bottom: 3rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            gap: 0.5rem;
        }

        .logo {
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: -0.01em;
            color: var(--accent);
            text-transform: uppercase;
        }

        .timestamp {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-muted);
            font-feature-settings: 'tnum';
        }

        /* Conteúdo principal */
        .content {
            font-size: 1rem;
        }

        /* Tipografia consistente */
        h1, h2, h3, h4, h5, h6 {
            font-weight: 600;
            line-height: 1.3;
            margin-top: 2.4rem;
            margin-bottom: 0.8rem;
            color: var(--accent);
            letter-spacing: -0.02em;
        }

        h1 {
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 1.2rem;
        }
        h2 { font-size: 1.5rem; }
        h3 { font-size: 1.25rem; }
        h4 { font-size: 1.1rem; }

        p {
            margin-bottom: 1.25rem;
        }

        /* Listas mais legíveis */
        ul, ol {
            margin: 0 0 1.5rem 1.5rem;
        }
        li {
            margin-bottom: 0.35rem;
        }
        li > ul, li > ol {
            margin-top: 0.35rem;
            margin-bottom: 0;
        }

        /* Código inline e blocos */
        code {
            font-family: var(--font-mono);
            font-size: 0.85em;
            background: var(--code-bg);
            padding: 0.2rem 0.4rem;
            border-radius: 6px;
            word-break: break-word;
        }

        pre {
            background: var(--code-bg);
            padding: 1rem;
            border-radius: 10px;
            overflow-x: auto;
            margin: 1.5rem 0;
            font-size: 0.85rem;
            line-height: 1.45;
            border: 1px solid var(--border);
        }

        pre code {
            background: none;
            padding: 0;
            font-size: inherit;
            border-radius: 0;
        }

        /* Citações e destaque */
        blockquote {
            margin: 1.5rem 0;
            padding-left: 1.2rem;
            border-left: 3px solid var(--accent);
            color: var(--text-muted);
            font-style: normal;
        }

        hr {
            border: none;
            height: 1px;
            background: var(--border);
            margin: 2rem 0;
        }

        /* Links (se houver no conteúdo) */
        a {
            color: var(--accent);
            text-decoration: underline;
            text-decoration-thickness: 1px;
            text-underline-offset: 2px;
        }
        a:hover {
            text-decoration-thickness: 2px;
        }

        /* Imagens responsivas */
        img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            margin: 1rem 0;
        }

        /* Tabelas simples */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5rem 0;
            font-size: 0.9rem;
        }
        th, td {
            border: 1px solid var(--border);
            padding: 0.6rem;
            text-align: left;
        }
        th {
            background: var(--bg-subtle);
            font-weight: 600;
        }

        /* Foco acessível */
        :focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
            border-radius: 4px;
        }

        /* Rodapé elegante */
        footer {
            margin-top: 5rem;
            padding-top: 1.5rem;
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: center;
            border-top: 1px solid var(--border);
        }

        /* Cores específicas solicitadas no prompt */
        .pessoa { color: #d93025; font-weight: 600; }
        .instituicao { color: #1a73e8; font-weight: 600; }

        /* Ajustes mobile */



        @media (max-width: 560px) {
            body {
                padding: 1rem;
            }
            h1 { font-size: 1.5rem; }
            h2 { font-size: 1.3rem; }
            .wrapper {
                max-width: 100%;
            }
            pre {
                padding: 0.75rem;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <div class="logo">Resposta do Modelo</div>
            <div class="timestamp">{{TIMESTAMP}}</div>
        </header>
        <main class="content" id="main-content">
            {{CONTENT}}
        </main>
        <footer>
            Gerado automaticamente • resposta.html — <a href="#main-content" style="text-decoration:none; border-bottom:1px dotted;">↑ voltar ao topo</a>
        </footer>
    </div>
</body>
</html>

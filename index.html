<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ollama · Overleaf clean</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-app: #f8f9fa;
            --sidebar-bg: #ffffff;
            --sidebar-border: #e9ecef;
            --main-bg: #ffffff;
            --chat-border: #eef2f6;
            --user-msg-bg: #f1f3f5;
            --assistant-msg-bg: #ffffff;
            --text-primary: #212529;
            --text-secondary: #6c757d;
            --accent: #000000;
            --hover-bg: #f8f9fa;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.03), 0 1px 3px rgba(0,0,0,0.03);
            --radius-card: 12px;
        }

        body {
            background: var(--bg-app);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
            color: var(--text-primary);
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f3f5;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #ced4da;
            border-radius: 10px;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--sidebar-border);
            display: flex;
            flex-direction: column;
            padding: 20px 16px;
            gap: 20px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .logo-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--sidebar-border);
        }
        .logo {
            font-size: 1.3rem;
            font-weight: 600;
            background: #000;
            color: white;
            padding: 4px 10px;
            border-radius: 8px;
        }
        .logo small {
            font-size: 0.65rem;
            font-weight: 400;
        }

        .new-chat {
            background: transparent;
            border: 1px solid var(--sidebar-border);
            border-radius: 8px;
            padding: 8px 12px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .new-chat:hover {
            background: var(--hover-bg);
        }

        .chats-header {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin: 8px 0 8px 8px;
        }

        .chats-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .chat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            border: 1px solid transparent;
        }
        .chat-item:hover {
            background: var(--hover-bg);
            border-color: var(--sidebar-border);
        }
        .chat-item.active {
            background: #f1f3f5;
            border-color: #dee2e6;
        }
        .chat-title {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }
        .delete-chat {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            color: #adb5bd;
            visibility: hidden;
        }
        .chat-item:hover .delete-chat {
            visibility: visible;
        }
        .delete-chat:hover {
            color: #dc3545;
        }

        .save-chat-btn {
            background: transparent;
            border: 1px solid var(--sidebar-border);
            border-radius: 8px;
            padding: 10px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .save-chat-btn:hover {
            background: var(--hover-bg);
        }

        /* MAIN */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--main-bg);
            overflow: hidden;
        }

        .topbar {
            height: 56px;
            padding: 0 24px;
            border-bottom: 1px solid var(--chat-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
        }
        .model-name {
            font-weight: 600;
            font-size: 0.85rem;
        }
        .model-status {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-left: 8px;
        }
        #modelSelector {
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--chat-border);
            background: white;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 32px 24px;
            background: #fdfdfd;
        }
        .message-container {
            max-width: 860px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
        }
        .message-role {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .message-bubble {
            background: var(--assistant-msg-bg);
            border: 1px solid var(--chat-border);
            border-radius: 12px;
            padding: 20px 24px;
            font-size: 0.95rem;
            line-height: 1.6;
            box-shadow: var(--shadow-sm);
        }
        .user-message .message-bubble {
            background: var(--user-msg-bg);
            border-color: transparent;
        }
        .message-bubble h1, .message-bubble h2, .message-bubble h3 {
            font-weight: 600;
            margin-top: 1.2em;
            margin-bottom: 0.6em;
        }
        .message-bubble p { margin-bottom: 0.8em; }
        .message-bubble ul, .message-bubble ol { margin-left: 1.5em; margin-bottom: 1em; }
        .message-bubble code {
            background: #f0f0f3;
            padding: 0.2em 0.4em;
            border-radius: 6px;
            font-family: 'Source Code Pro', monospace;
        }
        .message-bubble pre {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 12px;
            overflow-x: auto;
            font-family: 'Source Code Pro', monospace;
            border: 1px solid var(--chat-border);
        }
        .revise-btn {
            background: transparent;
            border: 1px solid var(--chat-border);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.7rem;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .revise-btn:hover {
            background: #f1f3f5;
        }

        .streaming-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: #000;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        .error-message {
            margin-top: 20px;
            background: #fff0f0;
            border-left: 3px solid #dc3545;
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .input-wrapper {
            padding: 20px 24px 28px;
            border-top: 1px solid var(--chat-border);
            background: white;
        }
        .input-card {
            max-width: 860px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid var(--chat-border);
            border-radius: 16px;
            padding: 16px 20px;
            box-shadow: var(--shadow-sm);
        }
        .input-card:focus-within {
            border-color: #adb5bd;
        }
        textarea {
            width: 100%;
            border: none;
            resize: none;
            outline: none;
            font-size: 0.9rem;
            min-height: 70px;
            font-family: 'Inter', sans-serif;
            background: transparent;
        }
        .actions {
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .file-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .file-btn {
            background: transparent;
            border: 1px solid var(--chat-border);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .file-btn:hover {
            background: var(--hover-bg);
        }
        .send-btn, .stop-generation {
            border: none;
            background: #000;
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .send-btn:disabled, .stop-generation:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .stop-generation {
            background: #fff;
            border: 1px solid #dc3545;
            color: #dc3545;
        }
        .status {
            margin-top: 12px;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        .loader-icon {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #fff;
            border-top-color: #aaa;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <div class="logo-area">
            <div class="logo">ollama<small>ai</small></div>
        </div>
        <button class="new-chat" id="newChatBtn">+ Novo chat</button>
        <div class="chats-header">Conversas</div>
        <div class="chats-list" id="chatsList"></div>
        <button class="save-chat-btn" id="saveChatBtn">💾 Salvar conversa</button>
    </aside>

    <main class="main">
        <div class="topbar">
            <div><span class="model-name">Ollama local</span><span class="model-status">contexto total</span></div>
            <select id="modelSelector"><option>Carregando modelos…</option></select>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message-container" id="messageContainer">
                <div class="message-wrapper assistant-message">
                    <div class="message-role">Assistente</div>
                    <div class="message-bubble">✦ Selecione ou crie um chat.</div>
                </div>
            </div>
            <div id="errorContainer"></div>
        </div>

        <div class="input-wrapper">
            <div class="input-card">
                <textarea id="promptInput" placeholder="Digite sua mensagem…"></textarea>
                <div class="actions">
                    <div class="file-group">
                        <label class="file-btn" for="contextFiles">📎</label>
                        <input type="file" id="contextFiles" multiple style="display: none;">
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button id="stopGenBtn" class="stop-generation" disabled>x</button>
                        <button id="sendRequestBtn" class="send-btn">↑</button>
                    </div>
                </div>
                <div class="status" id="statusInfo"></div>
            </div>
        </div>
    </main>
</div>

<script>
    (function(){
        // ---------- CONFIG ----------
        const GENERATE_URL = "http://localhost:11434/api/generate";
        const TAGS_URL = "http://localhost:11434/api/tags";
        const SAVE_CHAT_URL = "/save-chat";

        // DOM
        const promptEl = document.getElementById("promptInput");
        const sendBtn = document.getElementById("sendRequestBtn");
        const stopBtn = document.getElementById("stopGenBtn");
        const messageContainer = document.getElementById("messageContainer");
        const fileInput = document.getElementById("contextFiles");
        const errorContainer = document.getElementById("errorContainer");
        const modelSelector = document.getElementById("modelSelector");
        const newChatBtn = document.getElementById("newChatBtn");
        const saveChatBtn = document.getElementById("saveChatBtn");
        const statusSpan = document.getElementById("statusInfo");
        const chatsListDiv = document.getElementById("chatsList");

        // Estado
        let currentChatId = null;
        let chats = {};
        let attachedFiles = [];      // array de {name, content}
        let currentAbortController = null;
        let isGenerating = false;
        let currentStreamMessageDiv = null;
        let currentStreamBubble = null;
        let currentStreamText = "";

        // ---------- Chat storage / UI ----------
        function loadChatsFromStorage() {
            const stored = localStorage.getItem("ollama_chats_overleaf");
            if(stored) chats = JSON.parse(stored);
            else chats = {};
            renderChatsList();
        }
        function saveChatsToStorage() {
            localStorage.setItem("ollama_chats_overleaf", JSON.stringify(chats));
        }

        function createNewChat() {
            const id = Date.now().toString();
            chats[id] = { id, title: "Nova conversa", messages: [], createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() };
            saveChatsToStorage();
            return id;
        }

        function loadChat(chatId) {
            if(!chats[chatId]) return;
            currentChatId = chatId;
            renderChatMessages(chatId);
            renderChatsList();
            attachedFiles = [];
            promptEl.value = "";
            clearError();
        }

        function renderChatMessages(chatId) {
            const chat = chats[chatId];
            if(!chat) return;
            messageContainer.innerHTML = "";
            if(chat.messages.length === 0) {
                messageContainer.innerHTML = `<div class="message-wrapper assistant-message"><div class="message-role">Assistente</div><div class="message-bubble">Inicie a conversa!</div></div>`;
                return;
            }
            chat.messages.forEach(msg => {
                const wrapper = document.createElement('div');
                wrapper.className = `message-wrapper ${msg.role === 'user' ? 'user-message' : 'assistant-message'}`;
                wrapper.innerHTML = `
                    <div class="message-role"><span>${msg.role === 'user' ? 'Você' : 'Assistente'}</span></div>
                    <div class="message-bubble">${msg.content}</div>
                `;
                if(msg.role === 'assistant') {
                    const reviseBtn = document.createElement('button');
                    reviseBtn.className = 'revise-btn';
                    reviseBtn.innerHTML = '✎ Revisar';
                    reviseBtn.onclick = () => reviseMessage(msg.content);
                    wrapper.querySelector('.message-role').appendChild(reviseBtn);
                }
                messageContainer.appendChild(wrapper);
            });
            scrollToBottom();
        }

        function addMessageToCurrentChat(role, content) {
            if(!currentChatId) currentChatId = createNewChat();
            const chat = chats[currentChatId];
            chat.messages.push({ role, content, timestamp: new Date().toISOString() });
            chat.updatedAt = new Date().toISOString();
            if(chat.messages.length === 1 && role === 'user') {
                chat.title = content.slice(0, 30) + (content.length > 30 ? '…' : '');
            }
            saveChatsToStorage();
            renderChatMessages(currentChatId);
            renderChatsList();
        }

        function updateLastAssistantMessage(content) {
            if(!currentChatId) return;
            const chat = chats[currentChatId];
            const last = chat.messages[chat.messages.length-1];
            if(last && last.role === 'assistant') last.content = content;
            else chat.messages.push({ role: 'assistant', content, timestamp: new Date().toISOString() });
            saveChatsToStorage();
            renderChatMessages(currentChatId);
        }

        function deleteChat(chatId) {
            if(chatId === currentChatId) {
                const newId = createNewChat();
                loadChat(newId);
            }
            delete chats[chatId];
            saveChatsToStorage();
            renderChatsList();
            if(Object.keys(chats).length === 0) {
                const newId = createNewChat();
                loadChat(newId);
            } else if(currentChatId === chatId) {
                const firstId = Object.keys(chats)[0];
                loadChat(firstId);
            }
        }

        function renderChatsList() {
            const sorted = Object.values(chats).sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt));
            chatsListDiv.innerHTML = sorted.map(chat => `
                <div class="chat-item ${currentChatId === chat.id ? 'active' : ''}" data-id="${chat.id}">
                    <span class="chat-title">${escapeHtml(chat.title)}</span>
                    <button class="delete-chat" data-id="${chat.id}">x</button>
                </div>
            `).join("");
            document.querySelectorAll('.chat-item').forEach(el => {
                el.addEventListener('click', (e) => {
                    if(e.target.classList.contains('delete-chat')) return;
                    const id = el.dataset.id;
                    if(id) loadChat(id);
                });
                const del = el.querySelector('.delete-chat');
                if(del) del.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = del.dataset.id;
                    if(id && confirm("Excluir conversa?")) deleteChat(id);
                });
            });
        }

        function escapeHtml(str) {
            if(!str) return "";
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }

        function showError(msg) { errorContainer.innerHTML = `<div class="error-message">✖ ${escapeHtml(msg)}</div>`; }
        function clearError() { errorContainer.innerHTML = ""; }
        function scrollToBottom() { const ca = document.getElementById('chatArea'); ca.scrollTop = ca.scrollHeight; }

        // ---------- Arquivos (apenas botão, sem lista) ----------
        fileInput.addEventListener("change", async (e) => {
            const files = Array.from(e.target.files);
            for(const file of files) {
                try {
                    const content = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = reject;
                        reader.readAsText(file, "UTF-8");
                    });
                    attachedFiles.push({ name: file.name, content });
                } catch { showError(`Erro ao ler ${file.name}`); }
            }
            fileInput.value = "";  // permite anexar novamente os mesmos arquivos
            clearError();
            statusSpan.innerText = `${attachedFiles.length} arquivo(s) anexado(s) (serão usados no próximo envio)`;
            setTimeout(() => { if(statusSpan.innerText.includes("anexado")) statusSpan.innerText = ""; }, 3000);
        });

        // ---------- Prompt com histórico + arquivos ----------
        function buildFullPromptWithHistory(userMessage, historyMessages) {
            let context = "";
            if(attachedFiles.length) {
                context += "\n/// ARQUIVOS ANEXADOS ///\n";
                attachedFiles.forEach(f => context += `[${f.name}]\n${f.content}\n`);
                context += "\n/// FIM ///\n\n";
            }
            let conv = "";
            for(const msg of historyMessages) {
                conv += `${msg.role === 'user' ? 'Usuário' : 'Assistente'}: ${msg.content}\n`;
            }
            const system = "Você é um assistente especialista. Responda em HTML puro e bem formatado (tags semânticas, sem markdown).";
            return `${system}\n\n${context}\n${conv}\nUsuário: ${userMessage}\nAssistente:`;
        }

        // ---------- Streaming request ----------
        async function sendStreamingRequest(model, fullPrompt) {
            currentAbortController = new AbortController();
            const response = await fetch(GENERATE_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ model, prompt: fullPrompt, stream: true, options: { temperature: 0, seed: 42 } }),
                signal: currentAbortController.signal
            });
            if(!response.ok) throw new Error(`HTTP ${response.status}`);
            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");
            let buffer = "", accumulated = "";
            while(true) {
                const { done, value } = await reader.read();
                if(done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split("\n");
                buffer = lines.pop();
                for(const line of lines) {
                    if(!line.trim()) continue;
                    try {
                        const chunk = JSON.parse(line);
                        if(chunk.response) {
                            accumulated += chunk.response;
                            if(currentStreamBubble) {
                                currentStreamBubble.innerHTML = accumulated + `<span class="streaming-cursor"></span>`;
                                scrollToBottom();
                            }
                        }
                    } catch(e) {}
                }
            }
            return accumulated;
        }

        // ---------- Enviar mensagem principal ----------
        async function sendPrompt() {
            if(isGenerating) { showError("Aguarde a resposta atual."); return; }
            clearError();
            const userMsg = promptEl.value.trim();
            if(!userMsg && attachedFiles.length === 0) { showError("Digite uma mensagem ou anexe arquivos."); return; }
            const selectedModel = modelSelector.value;
            if(!selectedModel || selectedModel.includes("Nenhum")) { showError("Selecione um modelo."); return; }
            if(!currentChatId) currentChatId = createNewChat();

            isGenerating = true;
            sendBtn.disabled = true;
            stopBtn.disabled = false;
            sendBtn.innerHTML = `<div class="loader-icon"></div>`;
            statusSpan.innerText = "gerando...";

            addMessageToCurrentChat('user', userMsg);
            const chat = chats[currentChatId];
            const historyMessages = chat.messages.slice(0, -1);
            const fullPrompt = buildFullPromptWithHistory(userMsg, historyMessages);

            // placeholder para streaming
            const tempWrapper = document.createElement('div');
            tempWrapper.className = 'message-wrapper assistant-message streaming-message';
            tempWrapper.innerHTML = `<div class="message-role">Assistente</div><div class="message-bubble"><span class="streaming-cursor"></span></div>`;
            messageContainer.appendChild(tempWrapper);
            currentStreamMessageDiv = tempWrapper;
            currentStreamBubble = tempWrapper.querySelector('.message-bubble');
            currentStreamText = "";
            scrollToBottom();

            try {
                const finalResponse = await sendStreamingRequest(selectedModel, fullPrompt);
                if(currentStreamMessageDiv) currentStreamMessageDiv.remove();
                updateLastAssistantMessage(finalResponse);
                statusSpan.innerText = "✓ resposta concluída";
                // limpar arquivos após envio
                attachedFiles = [];
            } catch(err) {
                if(err.name === 'AbortError') {
                    statusSpan.innerText = "X Geração cancelada";
                    if(currentStreamText) updateLastAssistantMessage(currentStreamText + " (cancelado)");
                } else {
                    showError(`Erro: ${err.message}`);
                }
                if(currentStreamMessageDiv) currentStreamMessageDiv.remove();
            } finally {
                isGenerating = false;
                sendBtn.disabled = false;
                stopBtn.disabled = true;
                sendBtn.innerHTML = "↑";
                promptEl.value = "";
                currentStreamMessageDiv = null;
                currentStreamBubble = null;
            }
        }

        // ---------- Revisar mensagem ----------
        async function reviseMessage(originalContent) {
            if(isGenerating) { showError("Aguarde a geração atual."); return; }
            const selectedModel = modelSelector.value;
            if(!selectedModel) return;
            const revisePrompt = `A seguir está uma resposta. Revise e melhore, mantendo o mesmo estilo HTML. Corrija erros e melhore a clareza.\n\nResposta original:\n${originalContent}\n\nNova versão revisada:`;
            
            isGenerating = true;
            sendBtn.disabled = true;
            stopBtn.disabled = false;
            sendBtn.innerHTML = `<div class="loader-icon"></div>`;
            statusSpan.innerText = "revisando...";

            const tempWrapper = document.createElement('div');
            tempWrapper.className = 'message-wrapper assistant-message streaming-message';
            tempWrapper.innerHTML = `<div class="message-role">Assistente (revisão)</div><div class="message-bubble"><span class="streaming-cursor"></span></div>`;
            messageContainer.appendChild(tempWrapper);
            currentStreamMessageDiv = tempWrapper;
            currentStreamBubble = tempWrapper.querySelector('.message-bubble');
            scrollToBottom();

            try {
                const revised = await sendStreamingRequest(selectedModel, revisePrompt);
                if(currentStreamMessageDiv) currentStreamMessageDiv.remove();
                addMessageToCurrentChat('assistant', revised);
                statusSpan.innerText = "✓ revisão concluída";
            } catch(err) {
                if(err.name !== 'AbortError') showError(`Erro na revisão: ${err.message}`);
                if(currentStreamMessageDiv) currentStreamMessageDiv.remove();
            } finally {
                isGenerating = false;
                sendBtn.disabled = false;
                stopBtn.disabled = true;
                sendBtn.innerHTML = "↑";
            }
        }

        function stopGeneration() {
            if(currentAbortController && isGenerating) currentAbortController.abort();
        }

        async function saveChatToServer() {
            if(!currentChatId || chats[currentChatId].messages.length === 0) {
                showError("Nenhuma mensagem para salvar.");
                return;
            }
            const chat = chats[currentChatId];
            const chatData = { history: chat.messages, savedAt: new Date().toISOString(), model: modelSelector.value, title: chat.title };
            try {
                const res = await fetch(SAVE_CHAT_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(chatData) });
                const result = await res.json();
                if(res.ok) statusSpan.innerText = `💾 Salvo: ${result.file}`;
                else showError(`Erro: ${result.error}`);
            } catch(err) { showError(`Falha: ${err.message}`); }
        }

        function newChat() { loadChat(createNewChat()); }

        async function loadModels() {
            try {
                const res = await fetch(TAGS_URL);
                const data = await res.json();
                const models = data.models || [];
                if(models.length === 0) modelSelector.innerHTML = '<option>Nenhum modelo</option>';
                else modelSelector.innerHTML = models.map(m => `<option value="${escapeHtml(m.name)}">${escapeHtml(m.name)}</option>`).join("");
            } catch(e) { modelSelector.innerHTML = '<option>Erro</option>'; }
        }

        // Inicialização
        loadChatsFromStorage();
        if(Object.keys(chats).length === 0) loadChat(createNewChat());
        else loadChat(Object.keys(chats)[0]);
        loadModels();

        sendBtn.addEventListener("click", sendPrompt);
        stopBtn.addEventListener("click", stopGeneration);
        newChatBtn.addEventListener("click", newChat);
        saveChatBtn.addEventListener("click", saveChatToServer);
        promptEl.addEventListener("keydown", (e) => { if(e.key === "Enter" && !e.shiftKey && !isGenerating) { e.preventDefault(); sendPrompt(); } });
    })();
</script>
</body>
</html>
